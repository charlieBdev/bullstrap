<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme Demo</title>
    <link
      id="theme-style"
      rel="stylesheet"
      href="bootstrap-source/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Bootstrap Theme Demo</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Link</a>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Dropdown
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li><hr class="dropdown-divider" /></li>
                <li>
                  <a class="dropdown-item" href="#">Something else here</a>
                </li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link disabled">Disabled</a>
            </li>
          </ul>
          <form class="d-flex" role="search">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button class="btn btn-outline-success" type="submit">
              Search
            </button>
          </form>
        </div>
      </div>
    </nav>
    <div class="container">
      <div class="my-3 d-flex justify-content-between">
				<div class="btn-group" role="group" aria-label="Component toggle">
					<input type="radio" class="btn-check" name="demoComponent" id="demoForm" autocomplete="off" onclick="addForm()">
					<label class="btn btn-outline-secondary" for="demoForm">Form</label>

					<input type="radio" class="btn-check" name="demoComponent" id="demoHorizontalForm" autocomplete="off" onclick="addHorizontalForm()">
					<label class="btn btn-outline-secondary" for="demoHorizontalForm">Horizontal Form</label>

					<input type="radio" class="btn-check" name="demoComponent" id="demoValidation" autocomplete="off" onclick="addValidation()">
					<label class="btn btn-outline-secondary" for="demoValidation">Validation</label>

					<input type="radio" class="btn-check" name="demoComponent" id="demoSpinner" autocomplete="off" onclick="addSpinner()">
					<label class="btn btn-outline-secondary" for="demoSpinner">Spinner</label>
				</div>
        <div
          class="btn-group"
          role="group"
          aria-label="Theme toggle"
        >
          <input
            type="radio"
            class="btn-check"
            name="demoTheme"
            id="demoThemeNone"
            autocomplete="off"
            onclick="swap()"
            checked
          />
          <label class="btn btn-outline-primary" for="demoThemeNone">None</label>

          <input
            type="radio"
            class="btn-check"
            name="demoTheme"
            id="demoThemeIris"
            autocomplete="off"
            onclick="swap('iris')"
          />
          <label class="btn btn-outline-primary" for="demoThemeIris">Iris</label>

          <input
            type="radio"
            class="btn-check"
            name="demoTheme"
            id="demoThemeHSES"
            autocomplete="off"
            onclick="swap('hses')"
          />
          <label class="btn btn-outline-primary" for="demoThemeHSES">HSES</label>
        </div>
      </div>

      <div id="demo-container" class="container-sm"></div>
    </div>

    <script src="bootstrap-source/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/index.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        setTooltips();
      });

      function swap(theme) {
        if (!theme) {
          document.getElementById("theme-style").href =
            "bootstrap-source/dist/css/bootstrap.min.css";
          return;
        }
        document.getElementById("theme-style").href =
          `css/${theme}-bootstrap.css`;
      }

      function setTooltips() {
        const tooltipTriggerList = document.querySelectorAll(
          '[data-bs-toggle="tooltip"]',
        );
        const tooltipList = [...tooltipTriggerList].map(
          (tooltipTriggerEl) => new bootstrap.Tooltip(tooltipTriggerEl),
        );

        const popoverTriggerList = document.querySelectorAll(
          '[data-bs-toggle="popover"]',
        );
        const popoverList = [...popoverTriggerList].map(
          (popoverTriggerEl) => new bootstrap.Popover(popoverTriggerEl),
        );
      }
    </script>
  </body>
</html>
