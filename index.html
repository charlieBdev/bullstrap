<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theme Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link id="theme-style" rel="stylesheet" href="bootstrap-source/dist/css/bootstrap.css" />
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2-bootstrap-5-theme/1.3.0/select2-bootstrap-5-theme.min.css" integrity="sha512-z/90a5SWiu4MWVelb5+ny7sAayYUfMmdXKEAbpj27PfdkamNdyI3hcjxPxkOPbrXoKIm7r9V2mElt5f1OtVhqA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://cdn.datatables.net/v/bs5/jszip-3.10.1/dt-2.3.7/af-2.7.1/b-3.2.6/b-colvis-3.2.6/b-html5-3.2.6/b-print-3.2.6/cr-2.1.2/cc-1.2.1/date-1.6.3/fc-5.0.5/fh-4.0.6/kt-2.12.2/r-3.0.8/rg-1.6.0/rr-1.5.1/sc-2.4.3/sb-1.8.4/sp-2.3.5/sl-3.1.3/sr-1.4.3/datatables.min.css" rel="stylesheet" integrity="sha384-cG/fst5iVesuASUU3YLweoZ/HpBT/iUhx3CSBa45inqeE8mwF+MtBk8xWjvxOXsx" crossorigin="anonymous">
  <link rel="stylesheet" href="https://raw.githack.com/charlieBdev/cbToast/main/dist/cbToast.min.css" />
  <script>
    // Set initial theme immediately to prevent flash
    (function () {
      const html = document.documentElement;
      const savedTheme = localStorage.getItem('bs-theme') || 'system';

      if (savedTheme === 'system') {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        html.setAttribute('data-bs-theme', prefersDark ? 'dark' : 'light');
      } else {
        html.setAttribute('data-bs-theme', savedTheme);
      }
    })();
  </script>
</head>

<body>
  <!-- Modal -->
  <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="staticBackdropLabel">Modal title</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>I will not close if you click outside of me. Don't even try to press escape key.</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary">Understood</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Nav -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-xxl">
      <a class="navbar-brand" href="#">Bootstrap Theme Demo</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <div class="nav-item dropdown ms-auto mt-2 mt-lg-0">
          <button id="bd-theme-text" class="btn btn-outline-primary dropdown-toggle d-flex align-items-center"
            type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i id="theme-icon" class="bi bi-circle-half opacity-0"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-lg-end shadow" aria-labelledby="bd-theme-text">
            <li>
              <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="light">
                <i class="bi bi-sun-fill me-2"></i>
                Light
              </button>
            </li>
            <li>
              <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="dark">
                <i class="bi bi-moon-stars-fill me-2"></i>
                Dark
              </button>
            </li>
            <li>
              <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="system">
                <i class="bi bi-circle-half me-2"></i>
                Auto
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <!-- Apps -->
  <div class="container-xxl">
    <div class="d-flex flex-column gap-3">
      <div class="d-flex gap-1 flex-wrap" role="group" aria-label="Theme toggle" id="themeRadioGroup">
        <input type="radio" class="btn-check" name="demoTheme" id="demoThemeNone" value="none" autocomplete="off" checked />
        <label class="btn btn-outline-primary" for="demoThemeNone">None</label>
        
        <input type="radio" class="btn-check" name="demoTheme" id="demoThemePortal" value="portal" autocomplete="off" />
        <label class="btn btn-outline-primary" for="demoThemePortal">Portal</label>
        
        <input type="radio" class="btn-check" name="demoTheme" id="demoThemeIris" value="iris" autocomplete="off" />
        <label class="btn btn-outline-primary" for="demoThemeIris">Iris</label>
        
        <input type="radio" class="btn-check" name="demoTheme" id="demoThemeHSES" value="hses" autocomplete="off" />
        <label class="btn btn-outline-primary" for="demoThemeHSES">HSES</label>

        <input type="radio" class="btn-check" name="demoTheme" id="demoThemeProperty" value="property" autocomplete="off" />
        <label class="btn btn-outline-primary" for="demoThemeProperty">Property</label>

        <input type="radio" class="btn-check" name="demoTheme" id="demoThemeWIMS" value="wims" autocomplete="off" />
        <label class="btn btn-outline-primary" for="demoThemeWIMS">WIMS</label>

        <input type="radio" class="btn-check" name="demoTheme" id="demoThemeRAndD" value="randd" autocomplete="off" />
        <label class="btn btn-outline-primary" for="demoThemeRAndD">R&D</label>

        <input type="radio" class="btn-check" name="demoTheme" id="demoThemeQuality" value="quality" autocomplete="off" />
        <label class="btn btn-outline-primary" for="demoThemeQuality">Quality</label>
        
        <input type="radio" class="btn-check" name="demoTheme" id="demoThemeDeskbooker" value="deskbooker" autocomplete="off" />
        <label class="btn btn-outline-primary" for="demoThemeDeskbooker">DeskBooker</label>
      </div>

      <div class="btn-group" role="group" aria-label="Component toggle">
        <button type="button" class="btn btn-outline-secondary" data-bs-toggle="modal"
          data-bs-target="#staticBackdrop">
          Modal
        </button>

        <button type="button" class="btn btn-outline-secondary" data-bs-toggle="tooltip"
          data-bs-title="This is a normal BS tooltip.">
          Tooltip
        </button>

        <button type="button" class="btn btn-outline-secondary" data-bs-toggle="popover" data-bs-title="Popover title"
          data-bs-content="And here's some amazing content. It's very engaging. Right?">
          Popover
        </button>

        <button type="button" class="btn btn-outline-secondary" id="toastBtn">
          Toast
        </button>
      </div>

      <!-- Components -->
      <div>
        <select id="demoComponentSelect" class="form-select">
          <option value="">Select component...</option>
          <option value="accordion">Accordion - done</option>
          <option value="alert">Alerts - done</option>
          <option value="badge">Badge - done</option>
          <option value="carousel">Carousel - done</option>
          <option value="form">Form - done</option>
          <option value="horizontalForm">Horizontal Form - done</option>
          <option value="pagination">Pagination - done</option>
          <option value="progress">Progress - done</option>
          <option value="select">Select2 - done?</option>
          <option value="spinner">Spinner - done</option>
          <option value="table">Table - done</option>
          <option value="typography">Typography - done</option>
          <option value="validation">Validation - done</option>
        </select>
      </div>
    </div>

    <div id="demo-container" class="container-sm mt-3"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="bootstrap-source/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js" integrity="sha384-VFQrHzqBh5qiJIU0uGU5CIW3+OWpdGGJM9LBnGbuIH2mkICcFZ7lPd/AAtI7SNf7" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js" integrity="sha384-/RlQG9uf0M2vcTw3CX7fbqgbj/h8wKxw7C3zu9/GxcBPRKOEcESxaxufwRXqzq6n" crossorigin="anonymous"></script>
  <script src="https://cdn.datatables.net/v/bs5/jszip-3.10.1/dt-2.3.7/af-2.7.1/b-3.2.6/b-colvis-3.2.6/b-html5-3.2.6/b-print-3.2.6/cr-2.1.2/cc-1.2.1/date-1.6.3/fc-5.0.5/fh-4.0.6/kt-2.12.2/r-3.0.8/rg-1.6.0/rr-1.5.1/sc-2.4.3/sb-1.8.4/sp-2.3.5/sl-3.1.3/sr-1.4.3/datatables.min.js" integrity="sha384-a/S3/c64zNg6lfE1f9hkC4/gXh6+zupQn1hBbEoNe/wahhJWJc0Xn8DKRTxLhX0X" crossorigin="anonymous"></script>
  <script type="module" src="js/site.js"></script>
</body>
</html>
